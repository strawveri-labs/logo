name: logo

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python strawveri_logo.py
      - run: python strawveri_wordmark.py
      - uses: actions/upload-artifact@v4
        with:
          name: logo-assets
          path: |
            strawveri_icon.png
            strawveri_icon.svg
            strawveri_icon_dots.csv
            strawveri_wordmark.png
            strawveri_wordmark.svg
          if-no-files-found: error
